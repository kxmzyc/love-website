<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>永远爱你</title>
  <link rel="stylesheet" href="css/global.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(135deg, #1a0533 0%, #2d0a4e 100%);
      min-height: 100vh;
      overflow-x: hidden;
      font-family: var(--font-cn), sans-serif;
    }

    #starCanvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: 0;
      opacity: 0;
      transition: opacity 1.5s ease;
    }
    #starCanvas.visible { opacity: 1; }

    .ending-content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 3rem 2rem;
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    .line {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s ease;
      margin-bottom: 2rem;
    }
    .line.show {
      opacity: 1;
      transform: translateY(0);
    }

    .line-1 { color: rgba(255,255,255,0.6); font-size: 1.1rem; }
    .line-2 { color: var(--white); font-size: 1.3rem; line-height: 2; }
    .line-3 { color: var(--white); font-size: 1.3rem; line-height: 2; }
    .line-4 { color: #FF6B9D; font-size: 1.5rem; }
    .line-5 { color: var(--white); font-size: 2.5rem; font-family: var(--font-cn); }
    .line-6 { color: rgba(255,107,157,0.8); font-size: 0.9rem; margin-top: 1rem; }

    .ending-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 1rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 1s ease, transform 1s ease;
    }
    .ending-buttons.show {
      opacity: 1;
      transform: translateY(0);
    }

    .ending-btn {
      padding: 0.7rem 1.5rem;
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 25px;
      background: rgba(255,255,255,0.08);
      color: var(--white);
      font-family: var(--font-cn);
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.3s ease;
    }
    .ending-btn:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.5);
      transform: translateY(-2px);
    }

    /* Shooting star */
    .shooting-star {
      position: fixed;
      width: 80px;
      height: 2px;
      background: linear-gradient(90deg, rgba(255,255,255,0.8), transparent);
      border-radius: 2px;
      pointer-events: none;
      z-index: 2;
      animation: shoot 0.8s linear forwards;
    }

    @keyframes shoot {
      0% { opacity: 1; transform: translateX(0) translateY(0); }
      100% { opacity: 0; transform: translateX(150px) translateY(80px); }
    }

    @media (max-width: 768px) {
      .line-2, .line-3 { font-size: 1.15rem; }
      .line-4 { font-size: 1.3rem; }
      .line-5 { font-size: 2rem; }
      .ending-content { padding: 2rem 1.5rem; }
    }

    @media (max-width: 480px) {
      .line-1 { font-size: 1rem; }
      .line-2, .line-3 { font-size: 1.05rem; }
      .line-4 { font-size: 1.2rem; }
      .line-5 { font-size: 1.7rem; }
      .ending-btn { font-size: 0.85rem; padding: 0.6rem 1.2rem; }
    }
  </style>
</head>
<body>
  <canvas id="starCanvas"></canvas>

  <main class="ending-content">
    <p class="line line-1">谢谢你来到我的世界。</p>
    <p class="line line-2">以后每一个六一儿童节，<br>我都想陪你一起过。</p>
    <p class="line line-3">因为在我这里，<br>你永远是小朋友。</p>
    <p class="line line-4">你是我最喜欢的礼物。</p>
    <p class="line line-5">❤️ 永远爱你 ❤️</p>
    <p class="line line-6">[你的名字] 写于 2025年六一儿童节</p>

    <div class="ending-buttons">
      <a href="gallery.html" class="ending-btn">📷 回去看相册</a>
      <a href="index.html" class="ending-btn">💕 重新看一遍</a>
      <a href="music.html" class="ending-btn">🎵 再听一次歌</a>
    </div>
  </main>

  <script src="js/global.js"></script>
  <script>
    // ===== Star Canvas =====
    const canvas = document.getElementById('starCanvas');
    const ctx = canvas.getContext('2d');
    let stars = [];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', () => { resizeCanvas(); initStars(); });
    resizeCanvas();

    function initStars() {
      stars = [];
      const count = 130;
      for (let i = 0; i < count; i++) {
        stars.push({
          x: Math.random() * canvas.width,
          y: Math.random() * canvas.height,
          size: Math.random() * 1.5 + 0.5,
          alpha: Math.random(),
          speed: Math.random() * 0.02 + 0.005,
          direction: Math.random() > 0.5 ? 1 : -1
        });
      }
    }
    initStars();

    function drawStars() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      stars.forEach(star => {
        star.alpha += star.speed * star.direction;
        if (star.alpha >= 1) { star.alpha = 1; star.direction = -1; }
        if (star.alpha <= 0.1) { star.alpha = 0.1; star.direction = 1; }
        ctx.beginPath();
        ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255, 255, 255, ${star.alpha})`;
        ctx.fill();
      });
      requestAnimationFrame(drawStars);
    }

    // ===== Shooting Star on Click =====
    document.addEventListener('click', (e) => {
      const star = document.createElement('div');
      star.classList.add('shooting-star');
      star.style.left = e.clientX + 'px';
      star.style.top = e.clientY + 'px';
      star.style.transform = `rotate(${30 + Math.random() * 20}deg)`;
      document.body.appendChild(star);
      setTimeout(() => star.remove(), 800);
    });

    // ===== Sequential Reveal =====
    const lines = document.querySelectorAll('.line');
    const buttons = document.querySelector('.ending-buttons');

    function startSequence() {
      // Black screen for 0.5s, then show stars
      setTimeout(() => {
        canvas.classList.add('visible');
        drawStars();
      }, 500);

      // Reveal lines one by one
      lines.forEach((line, i) => {
        setTimeout(() => {
          line.classList.add('show');
        }, 2000 + i * 1500);
      });

      // Show buttons after all lines
      setTimeout(() => {
        buttons.classList.add('show');
      }, 2000 + lines.length * 1500 + 500);
    }

    startSequence();
  </script>
</body>
</html>
