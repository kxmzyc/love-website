<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的故事 - 回忆时间轴</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2/dist/aos.css">
  <style>
    body {
      background: var(--bg-pink);
      overflow-x: hidden;
    }

    /* Top Nav */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(255, 240, 245, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 179, 204, 0.3);
      z-index: 1000;
    }

    .top-nav .logo {
      font-family: var(--font-cn);
      font-size: 1.2rem;
      color: var(--primary);
    }

    .top-nav .back-link {
      font-family: var(--font-cn);
      color: var(--primary);
      text-decoration: none;
      font-size: 0.95rem;
      transition: opacity 0.3s;
    }

    .top-nav .back-link:hover {
      opacity: 0.7;
    }

    /* Wave Decoration */
    .wave-top {
      position: relative;
      top: 56px;
      width: 100%;
      height: 80px;
      overflow: hidden;
    }

    .wave-top svg {
      width: 100%;
      height: 100%;
    }

    /* Page Header */
    .page-header {
      text-align: center;
      padding: 8rem 1.5rem 3rem;
    }

    .page-header h1 {
      font-family: var(--font-cn);
      font-size: 2.8rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: #999;
      font-size: 1rem;
    }

    /* Timeline */
    .timeline {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 50%;
      top: 0;
      bottom: 0;
      width: 2px;
      background: var(--primary-light);
      transform: translateX(-50%);
    }

    .timeline-item {
      position: relative;
      width: 50%;
      padding: 1rem 2.5rem;
      margin-bottom: 2rem;
    }

    .timeline-item:nth-child(odd) {
      left: 0;
      text-align: right;
    }

    .timeline-item:nth-child(even) {
      left: 50%;
      text-align: left;
    }

    /* Timeline Dot */
    .timeline-dot {
      position: absolute;
      top: 2rem;
      width: 16px;
      height: 16px;
      background: var(--primary);
      border: 3px solid var(--white);
      border-radius: 50%;
      box-shadow: 0 2px 8px rgba(255, 107, 157, 0.4);
      z-index: 2;
    }

    .timeline-item:nth-child(odd) .timeline-dot {
      right: -8px;
    }

    .timeline-item:nth-child(even) .timeline-dot {
      left: -8px;
    }

    /* Date Label */
    .timeline-date {
      display: inline-block;
      background: var(--primary);
      color: var(--white);
      font-size: 0.85rem;
      padding: 0.3rem 0.9rem;
      border-radius: 20px;
      margin-bottom: 0.8rem;
      font-family: var(--font-cn);
    }

    /* Card */
    .timeline-card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(255, 107, 157, 0.1);
      overflow: hidden;
      text-align: left;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .timeline-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 30px rgba(255, 107, 157, 0.2);
    }

    .timeline-card .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      display: block;
      background: var(--bg-pink);
    }

    .timeline-card .card-img-placeholder {
      width: 100%;
      height: 180px;
      background: linear-gradient(135deg, #FFF0F5, #FFE0EC);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .timeline-card .card-body {
      padding: 1.2rem;
    }

    .timeline-card .card-title {
      font-family: var(--font-cn);
      font-size: 1.3rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .timeline-card .card-text {
      color: #666;
      font-size: 0.95rem;
      line-height: 1.7;
      margin-bottom: 0.8rem;
    }

    .timeline-card .card-tag {
      display: inline-block;
      font-size: 0.8rem;
      color: var(--primary);
      background: rgba(255, 107, 157, 0.08);
      padding: 0.2rem 0.6rem;
      border-radius: 12px;
    }

    /* Mobile Responsive */
    @media (max-width: 768px) {
      .timeline::before {
        left: 20px;
      }

      .timeline-item {
        width: 100%;
        left: 0 !important;
        padding-left: 50px;
        padding-right: 1rem;
        text-align: left !important;
      }

      .timeline-item:nth-child(odd) .timeline-dot,
      .timeline-item:nth-child(even) .timeline-dot {
        left: 12px;
        right: auto;
      }

      .page-header h1 {
        font-size: 2.2rem;
      }
    }

    @media (max-width: 480px) {
      .page-header {
        padding-top: 6rem;
      }

      .page-header h1 {
        font-size: 1.9rem;
      }

      .timeline-card .card-img,
      .timeline-card .card-img-placeholder {
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <span class="logo">💕 我们的故事</span>
    <a href="index.html" class="back-link">← 返回首页</a>
  </nav>

  <!-- Wave Decoration -->
  <div class="wave-top">
    <svg viewBox="0 0 1440 80" preserveAspectRatio="none">
      <path fill="#FFB3CC" fill-opacity="0.3" d="M0,40 C360,80 720,0 1080,40 C1260,60 1380,50 1440,40 L1440,0 L0,0 Z"/>
    </svg>
  </div>

  <!-- Page Header -->
  <header class="page-header">
    <h1>我们的故事 💕</h1>
    <p>从相遇到现在，每一天都是礼物</p>
  </header>

  <!-- Timeline -->
  <section class="timeline">
    <!-- Node 1 -->
    <div class="timeline-item" data-aos="fade-right" data-aos-delay="0">
      <div class="timeline-dot" data-aos="zoom-in" data-aos-delay="100"></div>
      <span class="timeline-date">2024.03.01</span>
      <div class="timeline-card">
        <img src="images/1.jpg" alt="初次相遇" class="card-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="card-img-placeholder" style="display:none;">💗</div>
        <div class="card-body">
          <h3 class="card-title">初次相遇</h3>
          <p class="card-text">那是一个普通的下午，我们就这样认识了。</p>
          <span class="card-tag">📍 某个地方</span>
        </div>
      </div>
    </div>

    <!-- Node 2 -->
    <div class="timeline-item" data-aos="fade-left" data-aos-delay="100">
      <div class="timeline-dot" data-aos="zoom-in" data-aos-delay="200"></div>
      <span class="timeline-date">2024.04.16</span>
      <div class="timeline-card">
        <img src="images/2.jpg" alt="第一次一起吃饭" class="card-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="card-img-placeholder" style="display:none;">💗</div>
        <div class="card-body">
          <h3 class="card-title">第一次一起吃饭</h3>
          <p class="card-text">你点了你最喜欢的那道菜，我记得你吃得很开心。</p>
          <span class="card-tag">🍜 某家餐厅</span>
        </div>
      </div>
    </div>

    <!-- Node 3 -->
    <div class="timeline-item" data-aos="fade-right" data-aos-delay="200">
      <div class="timeline-dot" data-aos="zoom-in" data-aos-delay="300"></div>
      <span class="timeline-date">2024.06.20</span>
      <div class="timeline-card">
        <img src="images/3.jpg" alt="第一次牵手" class="card-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="card-img-placeholder" style="display:none;">💗</div>
        <div class="card-body">
          <h3 class="card-title">第一次牵手</h3>
          <p class="card-text">那天傍晚，我鼓起勇气，悄悄握住了你的手。</p>
          <span class="card-tag">🌅</span>
        </div>
      </div>
    </div>

    <!-- Node 4 -->
    <div class="timeline-item" data-aos="fade-left" data-aos-delay="300">
      <div class="timeline-dot" data-aos="zoom-in" data-aos-delay="400"></div>
      <span class="timeline-date">2024.08.01</span>
      <div class="timeline-card">
        <img src="images/4.jpg" alt="一起出去玩" class="card-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="card-img-placeholder" style="display:none;">💗</div>
        <div class="card-body">
          <h3 class="card-title">一起出去玩</h3>
          <p class="card-text">这是我们第一次一起出远门，每个瞬间都很珍贵。</p>
          <span class="card-tag">✈️</span>
        </div>
      </div>
    </div>

    <!-- Node 5 -->
    <div class="timeline-item" data-aos="fade-right" data-aos-delay="400">
      <div class="timeline-dot" data-aos="zoom-in" data-aos-delay="500"></div>
      <span class="timeline-date">2025.06.01</span>
      <div class="timeline-card">
        <img src="images/5.jpg" alt="第一次一起过六一" class="card-img" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="card-img-placeholder" style="display:none;">💗</div>
        <div class="card-body">
          <h3 class="card-title">第一次一起过六一儿童节</h3>
          <p class="card-text">所以做了这个网站送给你，希望你喜欢。</p>
          <span class="card-tag">🎁</span>
        </div>
      </div>
    </div>
  </section>


  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2/dist/aos.js"></script>
  <script src="js/global.js"></script>
  <script>
    AOS.init({
      duration: 800,
      easing: 'ease-out-cubic',
      once: true,
      offset: 80
    });
  </script>
</body>
</html>
