<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的相册 - 每一张都是回忆</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2/dist/aos.css">
  <style>
    body {
      background: var(--bg-pink);
      overflow-x: hidden;
    }

    /* Top Nav */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(255, 240, 245, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 179, 204, 0.3);
      z-index: 1000;
    }

    .top-nav .logo {
      font-family: var(--font-cn);
      font-size: 1.2rem;
      color: var(--primary);
    }

    .top-nav .back-link {
      font-family: var(--font-cn);
      color: var(--primary);
      text-decoration: none;
      font-size: 0.95rem;
      transition: opacity 0.3s;
    }

    .top-nav .back-link:hover { opacity: 0.7; }

    /* Petal Decoration */
    .petal-deco {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      height: 120px;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
<!-- CHUNK1 -->

    .petal-deco span {
      position: absolute;
      display: block;
      width: 12px;
      height: 12px;
      background: var(--primary-light);
      border-radius: 50% 0 50% 50%;
      opacity: 0.4;
      animation: petalFall 4s linear infinite;
    }

    @keyframes petalFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0.5; }
      100% { transform: translateY(120px) rotate(180deg); opacity: 0; }
    }

    /* Page Header */
    .page-header {
      text-align: center;
      padding: 7.5rem 1.5rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .page-header h1 {
      font-family: var(--font-cn);
      font-size: 2.8rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: #999;
      font-size: 1rem;
    }

    /* Filter Buttons */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      padding: 1.5rem 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .filter-btn {
      font-family: var(--font-cn);
      font-size: 0.95rem;
      padding: 0.4rem 1.2rem;
      border: 1.5px solid var(--primary-light);
      border-radius: 20px;
      background: var(--white);
      color: var(--primary);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8rem;
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem 1.5rem 6rem;
      position: relative;
      z-index: 1;
    }

    /* Polaroid Card */
    .polaroid {
      background: var(--white);
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 8px 8px 0;
      box-shadow: 0 3px 15px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .polaroid:nth-child(1)  { transform: rotate(-2deg); }
    .polaroid:nth-child(2)  { transform: rotate(1.5deg); }
    .polaroid:nth-child(3)  { transform: rotate(-1deg); }
    .polaroid:nth-child(4)  { transform: rotate(2.5deg); }
    .polaroid:nth-child(5)  { transform: rotate(-1.5deg); }
    .polaroid:nth-child(6)  { transform: rotate(0.5deg); }
    .polaroid:nth-child(7)  { transform: rotate(-2.5deg); }
    .polaroid:nth-child(8)  { transform: rotate(1deg); }
    .polaroid:nth-child(9)  { transform: rotate(-0.5deg); }
    .polaroid:nth-child(10) { transform: rotate(3deg); }
    .polaroid:nth-child(11) { transform: rotate(-1.8deg); }
    .polaroid:nth-child(12) { transform: rotate(2deg); }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.05) !important;
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.2);
      z-index: 2;
    }

    .polaroid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      background: linear-gradient(135deg, #FFF0F5, #FFE0EC);
    }

    .polaroid .caption {
      padding: 12px 6px 14px;
      font-family: var(--font-cn);
      font-size: 0.95rem;
      color: #555;
      text-align: center;
    }

    .polaroid.hidden {
      display: none;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .lightbox.active {
      display: flex;
      opacity: 1;
    }

    .lightbox-img {
      max-width: 90%;
      max-height: 65vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .lightbox-caption {
      color: var(--white);
      font-family: var(--font-cn);
      font-size: 1.2rem;
      margin-top: 1.2rem;
      text-align: center;
      max-width: 500px;
      line-height: 1.8;
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      color: var(--white);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      color: var(--white);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .lightbox-arrow:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        padding: 1rem 1rem 6rem;
      }

      .polaroid img { height: 150px; }

      .page-header h1 { font-size: 2.2rem; }

      .lightbox-arrow { width: 36px; height: 36px; font-size: 1rem; }
      .lightbox-prev { left: 0.8rem; }
      .lightbox-next { right: 0.8rem; }
    }

    @media (max-width: 480px) {
      .page-header { padding-top: 6rem; }
      .page-header h1 { font-size: 1.9rem; }
      .polaroid img { height: 120px; }
      .polaroid .caption { font-size: 0.85rem; padding: 8px 4px 10px; }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <span class="logo">📷 我们的相册</span>
    <a href="index.html" class="back-link">← 返回首页</a>
  </nav>

  <!-- Petal Decoration -->
  <div class="petal-deco">
    <span style="left:5%;animation-delay:0s;"></span>
    <span style="left:15%;animation-delay:0.8s;"></span>
    <span style="left:30%;animation-delay:1.5s;"></span>
    <span style="left:50%;animation-delay:0.4s;"></span>
    <span style="left:65%;animation-delay:2s;"></span>
    <span style="left:80%;animation-delay:1.2s;"></span>
    <span style="left:92%;animation-delay:0.6s;"></span>
  </div>

  <!-- Page Header -->
  <header class="page-header">
    <h1>我们的相册 📷</h1>
    <p>每一张照片都是最好的回忆</p>
  </header>

  <!-- Filter Buttons -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="daily">日常</button>
    <button class="filter-btn" data-filter="travel">出游</button>
    <button class="filter-btn" data-filter="special">特别时刻</button>
  </div>

  <!-- Gallery Grid -->
  <section class="gallery-grid">
    <div class="polaroid" data-category="daily" data-index="0" data-aos="fade-up" data-aos-delay="0">
      <img src="images/photo1.jpg" alt="2024年春天" loading="lazy">
      <div class="caption">2024年春天 🌸</div>
    </div>
    <div class="polaroid" data-category="daily" data-index="1" data-aos="fade-up" data-aos-delay="50">
      <img src="images/photo2.jpg" alt="一起吃的那顿饭" loading="lazy">
      <div class="caption">一起吃的那顿饭</div>
    </div>
    <div class="polaroid" data-category="special" data-index="2" data-aos="fade-up" data-aos-delay="100">
      <img src="images/photo3.jpg" alt="你笑得好好看" loading="lazy">
      <div class="caption">你笑得好好看</div>
    </div>
    <div class="polaroid" data-category="travel" data-index="3" data-aos="fade-up" data-aos-delay="150">
      <img src="images/photo4.jpg" alt="这天风很大" loading="lazy">
      <div class="caption">这天风很大</div>
    </div>
    <div class="polaroid" data-category="special" data-index="4" data-aos="fade-up" data-aos-delay="200">
      <img src="images/photo5.jpg" alt="我们的小秘密" loading="lazy">
      <div class="caption">我们的小秘密</div>
    </div>
    <div class="polaroid" data-category="daily" data-index="5" data-aos="fade-up" data-aos-delay="250">
      <img src="images/photo6.jpg" alt="傍晚的光" loading="lazy">
      <div class="caption">傍晚的光</div>
    </div>
    <div class="polaroid" data-category="daily" data-index="6" data-aos="fade-up" data-aos-delay="300">
      <img src="images/photo7.jpg" alt="你最喜欢的颜色" loading="lazy">
      <div class="caption">你最喜欢的颜色</div>
    </div>
    <div class="polaroid" data-category="travel" data-index="7" data-aos="fade-up" data-aos-delay="350">
      <img src="images/photo8.jpg" alt="好想再去一次" loading="lazy">
      <div class="caption">好想再去一次</div>
    </div>
    <div class="polaroid" data-category="daily" data-index="8" data-aos="fade-up" data-aos-delay="400">
      <img src="images/photo9.jpg" alt="偷拍的你" loading="lazy">
      <div class="caption">偷拍的你</div>
    </div>
    <div class="polaroid" data-category="travel" data-index="9" data-aos="fade-up" data-aos-delay="450">
      <img src="images/photo10.jpg" alt="那天的天空" loading="lazy">
      <div class="caption">那天的天空</div>
    </div>
    <div class="polaroid" data-category="special" data-index="10" data-aos="fade-up" data-aos-delay="500">
      <img src="images/photo11.jpg" alt="你的小脾气" loading="lazy">
      <div class="caption">你的小脾气</div>
    </div>
    <div class="polaroid" data-category="special" data-index="11" data-aos="fade-up" data-aos-delay="550">
      <img src="images/photo12.jpg" alt="永远的回忆" loading="lazy">
      <div class="caption">永远的回忆</div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">&times;</button>
    <button class="lightbox-arrow lightbox-prev" id="lbPrev">&#10094;</button>
    <button class="lightbox-arrow lightbox-next" id="lbNext">&#10095;</button>
    <img class="lightbox-img" id="lbImg" src="" alt="">
    <div class="lightbox-caption" id="lbCaption"></div>
  </div>


  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2/dist/aos.js"></script>
  <script src="js/global.js"></script>
  <script>
    AOS.init({ duration: 600, easing: 'ease-out-cubic', once: true, offset: 50 });

    // Photo data for lightbox
    const photos = [
      { src: 'images/photo1.jpg', caption: '2024年春天 🌸', desc: '春天的第一次合照，阳光刚刚好，你的笑容比花还好看。' },
      { src: 'images/photo2.jpg', caption: '一起吃的那顿饭', desc: '你说那家店的味道很像家里的味道，我记住了。' },
      { src: 'images/photo3.jpg', caption: '你笑得好好看', desc: '不经意间抓拍到的瞬间，是我手机里最珍贵的一张。' },
      { src: 'images/photo4.jpg', caption: '这天风很大', desc: '风把你的头发吹乱了，你嘟着嘴的样子特别可爱。' },
      { src: 'images/photo5.jpg', caption: '我们的小秘密', desc: '只有我们两个人知道的事情，想起来就会偷偷笑。' },
      { src: 'images/photo6.jpg', caption: '傍晚的光', desc: '夕阳把一切都染成了金色，那一刻时间好像停住了。' },
      { src: 'images/photo7.jpg', caption: '你最喜欢的颜色', desc: '从那以后，我看到这个颜色就会想起你。' },
      { src: 'images/photo8.jpg', caption: '好想再去一次', desc: '那个地方承载了太多美好的回忆，我们一定会再去的。' },
      { src: 'images/photo9.jpg', caption: '偷拍的你', desc: '你专注做事情的样子真的很好看，忍不住按下了快门。' },
      { src: 'images/photo10.jpg', caption: '那天的天空', desc: '你说这片天空好漂亮，其实我觉得你比天空更好看。' },
      { src: 'images/photo11.jpg', caption: '你的小脾气', desc: '生气的时候也很可爱，不过我还是希望你每天都开心。' },
      { src: 'images/photo12.jpg', caption: '永远的回忆', desc: '不管未来怎样，这些瞬间我会永远珍藏。' }
    ];

    let currentIndex = 0;
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCaption = document.getElementById('lbCaption');

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const photo = photos[currentIndex];
      lbImg.src = photo.src;
      lbCaption.textContent = photo.caption + ' — ' + photo.desc;
    }

    function prevPhoto() {
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      updateLightbox();
    }

    function nextPhoto() {
      currentIndex = (currentIndex + 1) % photos.length;
      updateLightbox();
    }

    // Event listeners
    document.querySelectorAll('.polaroid').forEach(card => {
      card.addEventListener('click', () => openLightbox(parseInt(card.dataset.index)));
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', prevPhoto);
    document.getElementById('lbNext').addEventListener('click', nextPhoto);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    });

    // Touch swipe
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });
    lightbox.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) prevPhoto();
        else nextPhoto();
      }
    });

    // Filter
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.polaroid').forEach(card => {
          if (filter === 'all' || card.dataset.category === filter) {
            card.classList.remove('hidden');
          } else {
            card.classList.add('hidden');
          }
        });
      });
    });
  </script>
</body>
</html>
