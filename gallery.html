<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的相册 - 每一张都是回忆</title>
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/aos@2/dist/aos.css">
  <style>
    body {
      background: var(--bg-pink);
      overflow-x: hidden;
    }

    /* Top Nav */
    .top-nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      background: rgba(255, 240, 245, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255, 179, 204, 0.3);
      z-index: 1000;
    }

    .top-nav .logo {
      font-family: var(--font-cn);
      font-size: 1.2rem;
      color: var(--primary);
    }

    .top-nav .back-link {
      font-family: var(--font-cn);
      color: var(--primary);
      text-decoration: none;
      font-size: 0.95rem;
      transition: opacity 0.3s;
    }

    .top-nav .back-link:hover { opacity: 0.7; }

    /* Petal Decoration */
    .petal-deco {
      position: fixed;
      top: 56px;
      left: 0;
      right: 0;
      height: 120px;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }
<!-- CHUNK1 -->

    .petal-deco span {
      position: absolute;
      display: block;
      width: 12px;
      height: 12px;
      background: var(--primary-light);
      border-radius: 50% 0 50% 50%;
      opacity: 0.4;
      animation: petalFall 4s linear infinite;
    }

    @keyframes petalFall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 0.5; }
      100% { transform: translateY(120px) rotate(180deg); opacity: 0; }
    }

    /* Page Header */
    .page-header {
      text-align: center;
      padding: 7.5rem 1.5rem 1.5rem;
      position: relative;
      z-index: 1;
    }

    .page-header h1 {
      font-family: var(--font-cn);
      font-size: 2.8rem;
      color: var(--text-dark);
      margin-bottom: 0.5rem;
    }

    .page-header p {
      color: #999;
      font-size: 1rem;
    }

    /* Filter Buttons */
    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 0.6rem;
      padding: 1.5rem 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 1;
    }

    .filter-btn {
      font-family: var(--font-cn);
      font-size: 0.95rem;
      padding: 0.4rem 1.2rem;
      border: 1.5px solid var(--primary-light);
      border-radius: 20px;
      background: var(--white);
      color: var(--primary);
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .filter-btn:hover,
    .filter-btn.active {
      background: var(--primary);
      color: var(--white);
      border-color: var(--primary);
    }

    /* Gallery Grid */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.8rem;
      max-width: 1000px;
      margin: 0 auto;
      padding: 1rem 1.5rem 6rem;
      position: relative;
      z-index: 1;
    }

    /* Polaroid Card */
    .polaroid {
      background: var(--white);
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 8px 8px 0;
      box-shadow: 0 3px 15px rgba(0, 0, 0, 0.06);
      cursor: pointer;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .polaroid:nth-child(1)  { transform: rotate(-2deg); }
    .polaroid:nth-child(2)  { transform: rotate(1.5deg); }
    .polaroid:nth-child(3)  { transform: rotate(-1deg); }
    .polaroid:nth-child(4)  { transform: rotate(2.5deg); }
    .polaroid:nth-child(5)  { transform: rotate(-1.5deg); }
    .polaroid:nth-child(6)  { transform: rotate(0.5deg); }
    .polaroid:nth-child(7)  { transform: rotate(-2.5deg); }
    .polaroid:nth-child(8)  { transform: rotate(1deg); }
    .polaroid:nth-child(9)  { transform: rotate(-0.5deg); }
    .polaroid:nth-child(10) { transform: rotate(3deg); }
    .polaroid:nth-child(11) { transform: rotate(-1.8deg); }
    .polaroid:nth-child(12) { transform: rotate(2deg); }
    .polaroid:nth-child(13) { transform: rotate(-2.2deg); }
    .polaroid:nth-child(14) { transform: rotate(1.8deg); }
    .polaroid:nth-child(15) { transform: rotate(-0.8deg); }

    .polaroid:hover {
      transform: rotate(0deg) scale(1.05) !important;
      box-shadow: 0 10px 30px rgba(255, 107, 157, 0.2);
      z-index: 2;
    }

    .polaroid img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      border-radius: 2px;
      background: linear-gradient(135deg, #FFF0F5, #FFE0EC);
    }

    .polaroid .caption {
      padding: 12px 6px 14px;
      font-family: var(--font-cn);
      font-size: 0.95rem;
      color: #555;
      text-align: center;
    }

    .polaroid.hidden {
      display: none;
    }

    /* Lightbox */
    .lightbox {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      z-index: 9999;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .lightbox.active {
      display: flex;
      opacity: 1;
    }

    .lightbox-img {
      max-width: 90%;
      max-height: 65vh;
      object-fit: contain;
      border-radius: 8px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    }

    .lightbox-caption {
      color: var(--white);
      font-family: var(--font-cn);
      font-size: 1.2rem;
      margin-top: 1.2rem;
      text-align: center;
      max-width: 500px;
      line-height: 1.8;
    }

    .lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      width: 40px;
      height: 40px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      color: var(--white);
      font-size: 1.5rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .lightbox-close:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .lightbox-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 44px;
      height: 44px;
      background: rgba(255, 255, 255, 0.15);
      border: none;
      border-radius: 50%;
      color: var(--white);
      font-size: 1.3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
    }

    .lightbox-arrow:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .lightbox-prev { left: 1.5rem; }
    .lightbox-next { right: 1.5rem; }

    /* Responsive */
    @media (max-width: 768px) {
      .gallery-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 1rem;
        padding: 1rem 1rem 6rem;
      }

      .polaroid img { height: 150px; }

      .page-header h1 { font-size: 2.2rem; }

      .lightbox-arrow { width: 36px; height: 36px; font-size: 1rem; }
      .lightbox-prev { left: 0.8rem; }
      .lightbox-next { right: 0.8rem; }
    }

    @media (max-width: 480px) {
      .page-header { padding-top: 6rem; }
      .page-header h1 { font-size: 1.9rem; }
      .polaroid img { height: 120px; }
      .polaroid .caption { font-size: 0.85rem; padding: 8px 4px 10px; }
    }
  </style>
</head>
<body>
  <!-- Top Navigation -->
  <nav class="top-nav">
    <span class="logo">📷 我们的相册</span>
    <a href="index.html" class="back-link">← 返回首页</a>
  </nav>

  <!-- Petal Decoration -->
  <div class="petal-deco">
    <span style="left:5%;animation-delay:0s;"></span>
    <span style="left:15%;animation-delay:0.8s;"></span>
    <span style="left:30%;animation-delay:1.5s;"></span>
    <span style="left:50%;animation-delay:0.4s;"></span>
    <span style="left:65%;animation-delay:2s;"></span>
    <span style="left:80%;animation-delay:1.2s;"></span>
    <span style="left:92%;animation-delay:0.6s;"></span>
  </div>

  <!-- Page Header -->
  <header class="page-header">
    <h1>我们的相册 📷</h1>
    <p>每一张照片都是最好的回忆</p>
  </header>

  <!-- Filter Buttons -->
  <div class="filter-bar">
    <button class="filter-btn active" data-filter="all">全部</button>
    <button class="filter-btn" data-filter="daily">日常</button>
    <button class="filter-btn" data-filter="travel">出游</button>
    <button class="filter-btn" data-filter="special">特别时刻</button>
  </div>

  <!-- Gallery Grid -->
  <section class="gallery-grid">
    <div class="polaroid" data-category="special" data-index="0" data-aos="fade-up" data-aos-delay="0">
      <img src="images1.jpg" alt="初次相遇" loading="lazy">
      <div class="caption">初次相遇 💕</div>
    </div>
    <div class="polaroid" data-category="daily" data-index="1" data-aos="fade-up" data-aos-delay="50">
      <img src="images2.jpg" alt="第一次一起吃东西" loading="lazy">
      <div class="caption">第一次一起吃东西</div>
    </div>
    <div class="polaroid" data-category="special" data-index="2" data-aos="fade-up" data-aos-delay="100">
      <img src="images3.jpg" alt="第一次牵手" loading="lazy">
      <div class="caption">第一次牵手 🌅</div>
    </div>
    <div class="polaroid" data-category="daily" data-index="3" data-aos="fade-up" data-aos-delay="150">
      <img src="images4.jpg" alt="第一次比爱心" loading="lazy">
      <div class="caption">第一次比爱心 🤟</div>
    </div>
    <div class="polaroid" data-category="special" data-index="4" data-aos="fade-up" data-aos-delay="200">
      <img src="images5.jpg" alt="宝宝生日" loading="lazy">
      <div class="caption">宝宝生日 🎂</div>
    </div>
    <div class="polaroid" data-category="special" data-index="5" data-aos="fade-up" data-aos-delay="250">
      <img src="images6.jpg" alt="在一起啦" loading="lazy">
      <div class="caption">在一起啦 💑</div>
    </div>
    <div class="polaroid" data-category="travel" data-index="6" data-aos="fade-up" data-aos-delay="300">
      <img src="images7.jpg" alt="第一次出去玩" loading="lazy">
      <div class="caption">第一次出去玩 🎡</div>
    </div>
    <div class="polaroid" data-category="special" data-index="7" data-aos="fade-up" data-aos-delay="350">
      <img src="images8.jpg" alt="六一" loading="lazy">
      <div class="caption">六一 🔒</div>
    </div>
    <div class="polaroid" data-category="travel" data-index="8" data-aos="fade-up" data-aos-delay="400">
      <img src="images9.jpg" alt="去宝宝县里" loading="lazy">
      <div class="caption">去宝宝县里 🚗</div>
    </div>
    <div class="polaroid" data-category="special" data-index="9" data-aos="fade-up" data-aos-delay="450">
      <img src="images10.jpg" alt="一百天" loading="lazy">
      <div class="caption">一百天 💯</div>
    </div>
    <div class="polaroid" data-category="travel" data-index="10" data-aos="fade-up" data-aos-delay="500">
      <img src="images11.jpg" alt="第二次旅行" loading="lazy">
      <div class="caption">第二次旅行 ✈️</div>
    </div>
    <div class="polaroid" data-category="special" data-index="11" data-aos="fade-up" data-aos-delay="550">
      <img src="images12.jpg" alt="两百天" loading="lazy">
      <div class="caption">两百天 💕</div>
    </div>
    <div class="polaroid" data-category="special" data-index="12" data-aos="fade-up" data-aos-delay="600">
      <img src="images13.jpg" alt="三百天" loading="lazy">
      <div class="caption">三百天 🤍</div>
    </div>
    <div class="polaroid" data-category="special" data-index="13" data-aos="fade-up" data-aos-delay="650">
      <img src="images14.jpg" alt="宝宝生日" loading="lazy">
      <div class="caption">宝宝生日 🎂</div>
    </div>
    <div class="polaroid" data-category="special" data-index="14" data-aos="fade-up" data-aos-delay="700">
      <img src="images15.jpg" alt="一周年" loading="lazy">
      <div class="caption">一周年 💍</div>
    </div>
  </section>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lbClose">&times;</button>
    <button class="lightbox-arrow lightbox-prev" id="lbPrev">&#10094;</button>
    <button class="lightbox-arrow lightbox-next" id="lbNext">&#10095;</button>
    <img class="lightbox-img" id="lbImg" src="" alt="">
    <div class="lightbox-caption" id="lbCaption"></div>
  </div>


  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/aos@2/dist/aos.js"></script>
  <script src="js/global.js"></script>
  <script>
    AOS.init({ duration: 600, easing: 'ease-out-cubic', once: true, offset: 50 });

    // Photo data for lightbox
    const photos = [
      { src: 'images1.jpg', caption: '初次相遇 💕', desc: '2025.04.26 那是一个普通的早上，我们就这样相遇了。' },
      { src: 'images2.jpg', caption: '第一次一起吃东西', desc: '2025.05.10 带宝宝去吃了冰，在小赤豆。' },
      { src: 'images3.jpg', caption: '第一次牵手 🌅', desc: '2025.05.11 那天傍晚，我鼓起勇气，握住了宝宝的手。' },
      { src: 'images4.jpg', caption: '第一次比爱心 🤟', desc: '2025.05.13 第一次和你比爱心，心跳加速的感觉。' },
      { src: 'images5.jpg', caption: '宝宝生日 🎂', desc: '2025.05.16 宝宝生日那天，你给我吃了蛋糕，甜到心里。' },
      { src: 'images6.jpg', caption: '在一起啦 💑', desc: '2025.05.18 这一天，我们正式在一起了。' },
      { src: 'images7.jpg', caption: '第一次出去玩 🎡', desc: '2025.05.30 第一次和你出去玩，每一秒都舍不得浪费。' },
      { src: 'images8.jpg', caption: '六一 🔒', desc: '2025.06.01 属于我们的秘密，心贴得更近了。' },
      { src: 'images9.jpg', caption: '去宝宝县里 🚗', desc: '2025.07.05 第一次去你的县里看你，路再远也值得。' },
      { src: 'images10.jpg', caption: '一百天 💯', desc: '2025.08.31 在一起一百天了，每一天都是幸福。' },
      { src: 'images11.jpg', caption: '第二次旅行 ✈️', desc: '2025.10.01 国庆假期，我们的第二次旅行。' },
      { src: 'images12.jpg', caption: '两百天 💕', desc: '2025.12.03 两百天，爱你的心只增不减。' },
      { src: 'images13.jpg', caption: '三百天 🤍', desc: '2026.03.14 三百天，白色情人节，和你一起。' },
      { src: 'images14.jpg', caption: '宝宝生日 🎂', desc: '2026.05.16 宝宝又长大一岁啦，生日快乐！' },
      { src: 'images15.jpg', caption: '一周年 💍', desc: '2026.05.18 一周年快乐！感谢你陪我走过这365天。' }
    ];

    let currentIndex = 0;
    const lightbox = document.getElementById('lightbox');
    const lbImg = document.getElementById('lbImg');
    const lbCaption = document.getElementById('lbCaption');

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      lightbox.classList.add('active');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('active');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const photo = photos[currentIndex];
      lbImg.src = photo.src;
      lbCaption.textContent = photo.caption + ' — ' + photo.desc;
    }

    function prevPhoto() {
      currentIndex = (currentIndex - 1 + photos.length) % photos.length;
      updateLightbox();
    }

    function nextPhoto() {
      currentIndex = (currentIndex + 1) % photos.length;
      updateLightbox();
    }

    // Event listeners
    document.querySelectorAll('.polaroid').forEach(card => {
      card.addEventListener('click', () => openLightbox(parseInt(card.dataset.index)));
    });

    document.getElementById('lbClose').addEventListener('click', closeLightbox);
    document.getElementById('lbPrev').addEventListener('click', prevPhoto);
    document.getElementById('lbNext').addEventListener('click', nextPhoto);

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('active')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') prevPhoto();
      if (e.key === 'ArrowRight') nextPhoto();
    });

    // Touch swipe
    let touchStartX = 0;
    lightbox.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });
    lightbox.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (Math.abs(diff) > 50) {
        if (diff > 0) prevPhoto();
        else nextPhoto();
      }
    });

    // Filter
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        document.querySelectorAll('.polaroid').forEach(card => {
          if (filter === 'all' || card.dataset.category === filter) {
            card.classList.remove('hidden');
          } else {
            card.classList.add('hidden');
          }
        });
      });
    });
  </script>
</body>
</html>
